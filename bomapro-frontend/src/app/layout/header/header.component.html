<header class="h-14 sm:h-16 bg-white dark:bg-slate-800 border-b border-gray-200 dark:border-slate-700 flex items-center justify-between px-3 sm:px-6 transition-colors duration-200">
  <div class="flex items-center gap-2 sm:gap-4 min-w-0">
    <button (click)="toggleSidebar.emit()" class="text-gray-500 dark:text-gray-400 hover:text-gray-700 dark:hover:text-gray-200 lg:hidden flex-shrink-0">
      <i class="fas fa-bars text-lg"></i>
    </button>
    <h2 class="text-sm sm:text-lg font-semibold text-gray-800 dark:text-gray-100 truncate">Rental Management</h2>
  </div>

  <div class="flex items-center gap-1 sm:gap-2 flex-shrink-0">
    <!-- Tenant/Org Switcher -->
    <ng-container *ngIf="authService.tenantList$ | async as tenants">
    <div class="relative" *ngIf="canSwitchTenants(tenants); else activeOrganizationBadge">
      <button
        (click)="showTenantMenu = !showTenantMenu; showUserMenu = false; showColorPicker = false"
        class="flex items-center gap-1.5 px-2 sm:px-3 py-1.5 rounded-lg text-sm hover:bg-gray-100 dark:hover:bg-slate-700 transition-colors border border-gray-200 dark:border-slate-600"
        [class.opacity-50]="switchingTenant"
        [disabled]="switchingTenant"
      >
        <i class="fas fa-building text-xs" [style.color]="themeService.accent"></i>
        <span class="text-gray-700 dark:text-gray-300 hidden sm:block max-w-[120px] truncate">{{ getActiveTenantName() }}</span>
        <i class="fas fa-chevron-down text-xs text-gray-400"></i>
      </button>

      <div
        *ngIf="showTenantMenu"
        class="absolute right-0 top-full mt-2 w-56 bg-white dark:bg-slate-800 rounded-lg shadow-lg border border-gray-200 dark:border-slate-700 py-1 z-50"
      >
        <div class="px-3 py-2 border-b border-gray-100 dark:border-slate-700">
          <p class="text-xs font-semibold text-gray-500 dark:text-gray-400 uppercase tracking-wider">Switch Organization</p>
        </div>
        <div *ngIf="tenantSwitchError" class="mx-3 mt-2 rounded-md border border-red-200 bg-red-50 px-2.5 py-2 text-xs text-red-700 dark:border-red-800/50 dark:bg-red-900/20 dark:text-red-300">
          {{ tenantSwitchError }}
        </div>
        <div class="max-h-48 overflow-y-auto">
          <button
            *ngFor="let tenant of tenants"
            (click)="switchTenant(tenant)"
            class="w-full text-left px-3 py-2 text-sm transition-colors flex items-center gap-2 text-gray-800 dark:text-gray-200 hover:bg-gray-100 dark:hover:bg-slate-700"
            [class.bg-gray-50]="tenant._id === (authService.currentTenantId$ | async)"
            [class.dark:bg-slate-700]="tenant._id === (authService.currentTenantId$ | async)"
          >
            <span class="w-6 h-6 rounded-md flex items-center justify-center text-xs font-bold text-white flex-shrink-0"
              [style.background-color]="themeService.accent">
              {{ tenant.name.charAt(0).toUpperCase() }}
            </span>
            <span class="truncate">{{ tenant.name }}</span>
            <i *ngIf="tenant._id === (authService.currentTenantId$ | async)" class="fas fa-check text-xs ml-auto" [style.color]="themeService.accent"></i>
          </button>
        </div>
      </div>
    </div>

    <ng-template #activeOrganizationBadge>
      <div *ngIf="tenants.length === 1" class="hidden sm:flex items-center gap-2 rounded-lg border border-gray-200 px-3 py-1.5 text-sm text-gray-700 dark:border-slate-600 dark:text-gray-300">
        <i class="fas fa-building text-xs" [style.color]="themeService.accent"></i>
        <span class="max-w-[140px] truncate">{{ tenants[0].name }}</span>
      </div>
    </ng-template>
    </ng-container>

    <!-- Theme toggle -->
    <button
      (click)="themeService.toggleTheme()"
      class="w-8 h-8 sm:w-9 sm:h-9 rounded-lg flex items-center justify-center text-gray-500 dark:text-gray-400 hover:bg-gray-100 dark:hover:bg-slate-700 transition-colors"
      [title]="(themeService.isDark$ | async) ? 'Switch to light mode' : 'Switch to dark mode'"
    >
      <i class="fas" [class.fa-moon]="!(themeService.isDark$ | async)" [class.fa-sun]="(themeService.isDark$ | async)"></i>
    </button>

    <!-- Accent color button -->
    <div class="relative">
      <button
        (click)="showColorPicker = !showColorPicker; showUserMenu = false"
        class="w-8 h-8 sm:w-9 sm:h-9 rounded-lg flex items-center justify-center hover:bg-gray-100 dark:hover:bg-slate-700 transition-colors"
        title="Accent color"
      >
        <span class="w-5 h-5 rounded-full border-2 border-gray-300 dark:border-gray-500" [style.background-color]="themeService.accent"></span>
      </button>

      <app-color-picker
        *ngIf="showColorPicker"
        [color]="themeService.accent"
        (colorChange)="onAccentChange($event)"
        (close)="showColorPicker = false"
      ></app-color-picker>
    </div>

    <!-- User Menu -->
    <div class="relative">
      <button
        (click)="showUserMenu = !showUserMenu; showColorPicker = false"
        class="flex items-center gap-1.5 sm:gap-2 px-2 sm:px-3 py-1.5 rounded-lg hover:bg-gray-100 dark:hover:bg-slate-700 transition-colors"
      >
        <div class="w-7 h-7 sm:w-8 sm:h-8 rounded-full flex items-center justify-center" [style.background-color]="themeService.accent">
          <span class="text-white text-sm font-medium">
            {{ (authService.user$ | async)?.name?.charAt(0)?.toUpperCase() || 'U' }}
          </span>
        </div>
        <span class="text-sm font-medium text-gray-700 dark:text-gray-300 hidden sm:block">
          {{ (authService.user$ | async)?.name || 'User' }}
        </span>
        <i class="fas fa-chevron-down text-xs text-gray-400"></i>
      </button>

      <div
        *ngIf="showUserMenu"
        class="absolute right-0 top-full mt-2 w-48 bg-white dark:bg-slate-800 rounded-lg shadow-lg border border-gray-200 dark:border-slate-700 py-2 z-50"
      >
        <div class="px-3 py-2 border-b border-gray-100 dark:border-slate-700">
          <p class="text-sm font-medium text-gray-800 dark:text-gray-200">{{ (authService.user$ | async)?.name }}</p>
          <p class="text-xs text-gray-500 dark:text-gray-400">{{ (authService.user$ | async)?.email }}</p>
        </div>
        <a routerLink="/settings" (click)="showUserMenu = false" class="block px-3 py-2 text-sm text-gray-700 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-slate-700">
          <i class="fas fa-cog mr-2"></i> Settings
        </a>
        <button (click)="logout(); showUserMenu = false" class="w-full text-left px-3 py-2 text-sm text-red-600 dark:text-red-400 hover:bg-gray-100 dark:hover:bg-slate-700">
          <i class="fas fa-sign-out-alt mr-2"></i> Logout
        </button>
      </div>
    </div>
  </div>
</header>
