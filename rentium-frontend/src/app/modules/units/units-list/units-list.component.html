<div>
  <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-4 mb-6">
    <h1 class="text-2xl font-bold text-gray-800 dark:text-gray-100">Units</h1>
    <button (click)="openCreateModal()" class="inline-flex items-center gap-2 px-4 py-2 rounded-lg text-white text-sm font-medium" [style.background-color]="themeService.accent">
      <i class="fas fa-plus"></i> Add Unit
    </button>
  </div>

  <!-- Filters -->
  <div class="flex flex-col sm:flex-row gap-3 mb-6">
    <div class="flex-1">
      <input
        type="text"
        [(ngModel)]="search"
        (keyup.enter)="onSearch()"
        placeholder="Search units..."
        class="w-full px-3 py-2 rounded-lg border border-gray-300 dark:border-slate-600 bg-white dark:bg-slate-800 text-gray-900 dark:text-gray-100 text-sm outline-none"
      />
    </div>
    <select [(ngModel)]="statusFilter" (change)="onFilterChange()" class="px-3 py-2 rounded-lg border border-gray-300 dark:border-slate-600 bg-white dark:bg-slate-800 text-gray-900 dark:text-gray-100 text-sm outline-none">
      <option value="">All Status</option>
      <option *ngFor="let s of statusOptions" [value]="s">{{ s | titlecase }}</option>
    </select>
  </div>

  <!-- Loading -->
  <div *ngIf="loading" class="flex items-center justify-center py-20">
    <i class="fas fa-spinner fa-spin text-2xl" [style.color]="themeService.accent"></i>
  </div>

  <!-- Table -->
  <div *ngIf="!loading" class="bg-white dark:bg-slate-800 rounded-xl border border-gray-200 dark:border-slate-700 overflow-hidden">
    <div class="overflow-x-auto">
      <table class="w-full text-sm">
        <thead>
          <tr class="border-b border-gray-200 dark:border-slate-700 bg-gray-50 dark:bg-slate-700/50">
            <th class="text-left px-4 py-3 font-medium text-gray-600 dark:text-gray-300">Unit Number</th>
            <th class="text-left px-4 py-3 font-medium text-gray-600 dark:text-gray-300 hidden sm:table-cell">Description</th>
            <th class="text-left px-4 py-3 font-medium text-gray-600 dark:text-gray-300">Rent Amount</th>
            <th class="text-left px-4 py-3 font-medium text-gray-600 dark:text-gray-300">Status</th>
            <th class="text-right px-4 py-3 font-medium text-gray-600 dark:text-gray-300">Actions</th>
          </tr>
        </thead>
        <tbody>
          <tr
            *ngFor="let unit of units"
            class="border-b border-gray-100 dark:border-slate-700 hover:bg-gray-50 dark:hover:bg-slate-700/30 transition-colors"
          >
            <td class="px-4 py-3">
              <p class="font-medium text-gray-800 dark:text-gray-100 cursor-pointer" (click)="viewUnit(unit._id)">{{ unit.unitNumber }}</p>
            </td>
            <td class="px-4 py-3 text-gray-600 dark:text-gray-300 hidden sm:table-cell">{{ unit.description || '-' }}</td>
            <td class="px-4 py-3 font-medium text-gray-800 dark:text-gray-100">{{ unit.currency || 'KES' }} {{ unit.rentAmount | number }}</td>
            <td class="px-4 py-3">
              <span class="px-2 py-1 rounded-full text-xs font-medium" [ngClass]="getStatusClass(unit.status)">{{ unit.status | titlecase }}</span>
            </td>
            <td class="px-4 py-3 text-right">
              <button
                (click)="openEditModal(unit)"
                class="px-2 py-1 text-xs rounded hover:opacity-80 transition-opacity mr-2"
                [style.color]="themeService.accent"
              >
                <i class="fas fa-edit"></i> Edit
              </button>
              <button
                (click)="deleteUnit(unit._id)"
                class="px-2 py-1 text-xs rounded text-red-600 hover:opacity-80 transition-opacity"
              >
                <i class="fas fa-trash"></i> Delete
              </button>
            </td>
          </tr>
        </tbody>
      </table>
    </div>

    <div *ngIf="units.length === 0" class="text-center py-12 text-gray-500 dark:text-gray-400">
      <i class="fas fa-door-open text-3xl mb-3 block"></i>
      <p>No units found</p>
    </div>

    <!-- Pagination -->
    <div *ngIf="totalPages > 1" class="flex items-center justify-between px-4 py-3 border-t border-gray-200 dark:border-slate-700">
      <span class="text-sm text-gray-500 dark:text-gray-400">{{ total }} total</span>
      <div class="flex gap-1">
        <button *ngFor="let p of [].constructor(totalPages); let i = index"
          (click)="goToPage(i + 1)"
          class="w-8 h-8 rounded text-sm font-medium transition-colors"
          [class.text-white]="page === i + 1"
          [style.background-color]="page === i + 1 ? themeService.accent : 'transparent'"
          [class.text-gray-600]="page !== i + 1"
          [class.hover:bg-gray-100]="page !== i + 1"
        >{{ i + 1 }}</button>
      </div>
    </div>
  </div>

  <!-- Form Modal -->
  <app-units-form
    [isOpen]="formModalOpen"
    [unit]="selectedUnit"
    [propertyId]="propertyId"
    (close)="closeFormModal()"
    (save)="onUnitSaved($event)"
  ></app-units-form>
</div>
