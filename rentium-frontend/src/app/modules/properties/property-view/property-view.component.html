<div *ngIf="isOpen" class="fixed inset-0 bg-black bg-opacity-50 z-50 flex items-center justify-center p-4 modal-backdrop" [@fadeIn]>
  <div class="bg-white dark:bg-slate-800 rounded-lg shadow-lg max-w-2xl w-full max-h-[90vh] overflow-y-auto modal-content" [@slideDown]>
    <!-- Header -->
    <div class="sticky top-0 bg-white dark:bg-slate-800 border-b border-gray-200 dark:border-slate-700 p-6 flex items-center justify-between z-10">
      <h2 class="text-2xl font-bold text-gray-900 dark:text-white">Property Details</h2>
      <button (click)="closeModal()" class="text-gray-500 dark:text-gray-400 hover:text-gray-700 dark:hover:text-gray-300 transition-colors">
        <i class="fas fa-times text-xl"></i>
      </button>
    </div>

    <!-- Content -->
    <div *ngIf="property" class="p-6 space-y-6">
      <!-- Property Code & Status -->
      <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
        <div>
          <label class="block text-sm font-medium text-gray-600 dark:text-gray-400 mb-2">Property Code</label>
          <p class="text-lg font-semibold text-gray-900 dark:text-white">{{ property.propertyCode }}</p>
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-600 dark:text-gray-400 mb-2">Status</label>
          <span class="inline-flex items-center px-3 py-1 rounded-full text-sm font-medium gap-2" [ngClass]="getStatusColor(property.status)">
            <i [class]="getStatusIcon(property.status)"></i>
            {{ property.status | titlecase }}
          </span>
        </div>
      </div>

      <!-- Name & Type -->
      <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
        <div>
          <label class="block text-sm font-medium text-gray-600 dark:text-gray-400 mb-2">Property Name</label>
          <p class="text-lg text-gray-900 dark:text-gray-100">{{ property.name }}</p>
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-600 dark:text-gray-400 mb-2">Type</label>
          <p class="text-lg text-gray-900 dark:text-gray-100">{{ property.type | titlecase }}</p>
        </div>
      </div>

      <!-- Address -->
      <div>
        <label class="block text-sm font-medium text-gray-600 dark:text-gray-400 mb-2">Address</label>
        <p class="text-lg text-gray-900 dark:text-gray-100">{{ property.address }}</p>
      </div>

      <!-- Owner & Year Built -->
      <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
        <div>
          <label class="block text-sm font-medium text-gray-600 dark:text-gray-400 mb-2">Owner</label>
          <p class="text-lg text-gray-900 dark:text-gray-100">{{ property.owner || 'N/A' }}</p>
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-600 dark:text-gray-400 mb-2">Year Built</label>
          <p class="text-lg text-gray-900 dark:text-gray-100">{{ property.yearBuilt || 'N/A' }}</p>
        </div>
      </div>

      <!-- Description -->
      <div *ngIf="property.description">
        <label class="block text-sm font-medium text-gray-600 dark:text-gray-400 mb-2">Description</label>
        <p class="text-lg text-gray-900 dark:text-gray-100">{{ property.description }}</p>
      </div>

      <!-- Amenities -->
      <div *ngIf="property.amenities && property.amenities.length > 0">
        <label class="block text-sm font-medium text-gray-600 dark:text-gray-400 mb-2">Amenities</label>
        <div class="flex flex-wrap gap-2">
          <span *ngFor="let amenity of property.amenities" class="inline-flex items-center px-3 py-1 rounded-full text-sm font-medium bg-blue-100 dark:bg-blue-900 text-blue-800 dark:text-blue-200">
            {{ amenity }}
          </span>
        </div>
      </div>
    </div>

    <!-- Footer -->
    <div class="sticky bottom-0 bg-white dark:bg-slate-800 border-t border-gray-200 dark:border-slate-700 p-6 flex gap-3 justify-end">
      <button
        (click)="closeModal()"
        class="px-6 py-2 rounded-lg border border-gray-300 dark:border-slate-600 text-gray-700 dark:text-gray-300 hover:bg-gray-50 dark:hover:bg-slate-700 font-medium transition-colors"
      >
        Close
      </button>
      <button
        (click)="onEdit()"
        class="px-6 py-2 rounded-lg bg-blue-600 hover:bg-blue-700 text-white font-medium transition-colors"
      >
        <i class="fas fa-edit mr-2"></i>Edit
      </button>
    </div>
  </div>
</div>
