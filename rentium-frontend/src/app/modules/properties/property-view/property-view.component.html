<div *ngIf="isOpen" class="fixed inset-0 bg-black bg-opacity-50 z-50 flex items-center justify-center p-4 modal-backdrop" [@fadeIn]>
  <div class="bg-white dark:bg-slate-800 rounded-xl shadow-2xl max-w-3xl w-full max-h-[90vh] overflow-hidden flex flex-col modal-content" [@slideDown]>
    <!-- Header with Theme Color -->
    <div class="sticky top-0 bg-gray-50 dark:bg-slate-700/50 border-b border-gray-200 dark:border-slate-700 p-6 flex items-center justify-between z-10">
      <div class="flex items-center gap-3">
        <i class="fas fa-building text-2xl" [style.color]="themeService.accent"></i>
        <h2 class="text-2xl font-bold text-gray-900 dark:text-white">Property Details</h2>
      </div>
      <button (click)="closeModal()" class="p-2 rounded-lg text-gray-500 dark:text-gray-400 hover:bg-gray-100 dark:hover:bg-slate-600 transition-colors">
        <i class="fas fa-times text-xl"></i>
      </button>
    </div>

    <!-- Scrollable Content -->
    <div class="overflow-y-auto flex-1">
      <div *ngIf="property" class="p-8 space-y-8">
        <!-- Property Code & Status Section -->
        <div class="grid grid-cols-1 sm:grid-cols-2 gap-6">
          <div class="p-4 rounded-lg bg-gray-50 dark:bg-slate-700/50">
            <label class="block text-xs font-semibold uppercase tracking-wider text-gray-600 dark:text-gray-400 mb-2">Property Code</label>
            <p class="text-2xl font-bold text-gray-900 dark:text-white font-mono">{{ property.propertyCode }}</p>
          </div>
          <div class="p-4 rounded-lg bg-gray-50 dark:bg-slate-700/50">
            <label class="block text-xs font-semibold uppercase tracking-wider text-gray-600 dark:text-gray-400 mb-3">Status</label>
            <span class="inline-flex items-center px-4 py-2 rounded-full text-sm font-bold gap-2" [ngClass]="getStatusColor(property.status)">
              <i [class]="getStatusIcon(property.status)"></i>
              {{ property.status | titlecase }}
            </span>
          </div>
        </div>

        <!-- Divider -->
        <hr class="border-gray-200 dark:border-slate-700" />

        <!-- Primary Info Section -->
        <div class="space-y-6">
          <!-- Name & Type -->
          <div class="grid grid-cols-1 sm:grid-cols-3 gap-6">
            <div>
              <label class="block text-xs font-semibold uppercase tracking-wider text-gray-600 dark:text-gray-400 mb-2">Property Name</label>
              <p class="text-xl font-semibold text-gray-900 dark:text-white">{{ property.name }}</p>
            </div>
            <div>
              <label class="block text-xs font-semibold uppercase tracking-wider text-gray-600 dark:text-gray-400 mb-2">Type</label>
              <div class="flex items-center gap-2">
                <span class="inline-block w-3 h-3 rounded-full" [style.background-color]="themeService.accent"></span>
                <p class="text-lg font-medium text-gray-900 dark:text-gray-100 capitalize">{{ property.type }}</p>
              </div>
            </div>
            <div>
              <label class="block text-xs font-semibold uppercase tracking-wider text-gray-600 dark:text-gray-400 mb-2">Year Built</label>
              <p class="text-lg font-medium text-gray-900 dark:text-gray-100">{{ property.yearBuilt || 'N/A' }}</p>
            </div>
          </div>

          <!-- Address -->
          <div>
            <label class="block text-xs font-semibold uppercase tracking-wider text-gray-600 dark:text-gray-400 mb-2">Address</label>
            <div class="flex items-start gap-3 p-4 rounded-lg bg-gray-50 dark:bg-slate-700/50">
              <i class="fas fa-map-marker-alt mt-1" [style.color]="themeService.accent"></i>
              <p class="text-lg text-gray-900 dark:text-gray-100">{{ property.address }}</p>
            </div>
          </div>

          <!-- Owner -->
          <div *ngIf="property.owner">
            <label class="block text-xs font-semibold uppercase tracking-wider text-gray-600 dark:text-gray-400 mb-2">Owner</label>
            <div class="flex items-center gap-2">
              <i class="fas fa-user-circle text-lg" [style.color]="themeService.accent"></i>
              <p class="text-lg text-gray-900 dark:text-gray-100">{{ property.owner }}</p>
            </div>
          </div>

          <!-- Description -->
          <div *ngIf="property.description">
            <label class="block text-xs font-semibold uppercase tracking-wider text-gray-600 dark:text-gray-400 mb-2">Description</label>
            <p class="text-base leading-relaxed text-gray-700 dark:text-gray-300 p-4 rounded-lg bg-gray-50 dark:bg-slate-700/50">{{ property.description }}</p>
          </div>

          <!-- Amenities -->
          <div *ngIf="property.amenities && property.amenities.length > 0">
            <label class="block text-xs font-semibold uppercase tracking-wider text-gray-600 dark:text-gray-400 mb-3">Amenities</label>
            <div class="flex flex-wrap gap-2">
              <span *ngFor="let amenity of property.amenities" class="inline-flex items-center px-4 py-2 rounded-full text-sm font-medium transition-all gap-2" 
                [style.background-color]="themeService.accent + '20'"
                [style.color]="themeService.accent"
              >
                <i class="fas fa-check-circle text-xs"></i>
                {{ amenity }}
              </span>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Footer -->
    <div class="sticky bottom-0 bg-white dark:bg-slate-800 border-t border-gray-200 dark:border-slate-700 p-6 flex gap-3 justify-end">
      <button
        (click)="closeModal()"
        class="px-6 py-2 rounded-lg border border-gray-300 dark:border-slate-600 text-gray-700 dark:text-gray-300 hover:bg-gray-50 dark:hover:bg-slate-700 font-medium transition-colors"
      >
        Close
      </button>
      <button
        (click)="onEdit()"
        class="px-6 py-2 rounded-lg text-white font-medium transition-all hover:shadow-lg duration-200"
        [style.background-color]="themeService.accent"
      >
        <i class="fas fa-edit mr-2"></i>Edit Property
      </button>
    </div>
  </div>
</div>
