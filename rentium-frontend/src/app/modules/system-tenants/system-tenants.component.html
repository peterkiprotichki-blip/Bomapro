<div>
  <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-4 mb-6">
    <h1 class="text-2xl font-bold text-gray-800 dark:text-gray-100">Organizations</h1>
    <button (click)="openForm()" class="inline-flex items-center gap-2 px-4 py-2 rounded-lg text-white text-sm font-medium" [style.background-color]="themeService.accent">
      <i class="fas fa-plus"></i> New Organization
    </button>
  </div>

  <div *ngIf="loading" class="flex items-center justify-center py-20">
    <i class="fas fa-spinner fa-spin text-2xl" [style.color]="themeService.accent"></i>
  </div>

  <div *ngIf="!loading" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
    <div *ngFor="let t of tenants" class="bg-white dark:bg-slate-800 rounded-xl border border-gray-200 dark:border-slate-700 p-4">
      <div class="flex items-start justify-between mb-3">
        <div>
          <h3 class="font-semibold text-gray-800 dark:text-gray-100">{{ t.name }}</h3>
          <p class="text-xs text-gray-500 dark:text-gray-400">{{ t.slug }}</p>
        </div>
        <span class="px-2 py-1 rounded-full text-xs font-medium" [ngClass]="getPlanClasses(t.plan)">{{ t.plan }}</span>
      </div>
      <div class="space-y-1 text-sm text-gray-600 dark:text-gray-300 mb-3">
        <div><i class="fas fa-envelope w-4 text-gray-400"></i> {{ t.contactEmail || '—' }}</div>
        <div><i class="fas fa-users w-4 text-gray-400"></i> Max Users: {{ t.maxUsers }}</div>
        <div><i class="fas fa-building w-4 text-gray-400"></i> Max Properties: {{ t.maxProperties }}</div>
      </div>
      <div class="flex items-center justify-between">
        <span class="px-2 py-1 rounded-full text-xs font-medium" [ngClass]="t.isActive ? 'bg-green-100 text-green-700 dark:bg-green-900/30 dark:text-green-400' : 'bg-red-100 text-red-700 dark:bg-red-900/30 dark:text-red-400'">
          {{ t.isActive ? 'Active' : 'Inactive' }}
        </span>
        <div class="flex gap-2">
          <button (click)="openForm(t)" class="w-7 h-7 rounded border border-gray-300 dark:border-slate-600 text-gray-500 dark:text-gray-400 flex items-center justify-center hover:bg-gray-50 dark:hover:bg-slate-700">
            <i class="fas fa-pen text-xs"></i>
          </button>
          <button (click)="deleteTenant(t._id)" class="w-7 h-7 rounded border border-red-300 dark:border-red-800 text-red-500 dark:text-red-400 flex items-center justify-center hover:bg-red-50 dark:hover:bg-red-900/20">
            <i class="fas fa-trash text-xs"></i>
          </button>
        </div>
      </div>
    </div>
  </div>
  <div *ngIf="!loading && tenants.length === 0" class="text-center py-12 text-gray-500 dark:text-gray-400">
    <i class="fas fa-sitemap text-3xl mb-3 block"></i><p>No organizations found</p>
  </div>

  <!-- Add/Edit Modal -->
  <div *ngIf="showForm" class="fixed inset-0 z-50 flex items-center justify-center bg-black/50">
    <div class="bg-white dark:bg-slate-800 rounded-xl border border-gray-200 dark:border-slate-700 p-6 w-full max-w-lg mx-4 max-h-[90vh] overflow-y-auto">
      <h2 class="text-lg font-semibold text-gray-800 dark:text-gray-100 mb-4">{{ editing ? 'Edit Organization' : 'New Organization' }}</h2>
      <div class="space-y-4">
        <div>
          <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Name *</label>
          <input type="text" [(ngModel)]="form.name" class="w-full px-3 py-2 rounded-lg border border-gray-300 dark:border-slate-600 bg-white dark:bg-slate-700 text-gray-900 dark:text-gray-100 text-sm outline-none" />
        </div>
        <div class="grid grid-cols-2 gap-4">
          <div>
            <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Slug</label>
            <input type="text" [(ngModel)]="form.slug" class="w-full px-3 py-2 rounded-lg border border-gray-300 dark:border-slate-600 bg-white dark:bg-slate-700 text-gray-900 dark:text-gray-100 text-sm outline-none" />
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Plan</label>
            <select [(ngModel)]="form.plan" class="w-full px-3 py-2 rounded-lg border border-gray-300 dark:border-slate-600 bg-white dark:bg-slate-700 text-gray-900 dark:text-gray-100 text-sm outline-none">
              <option *ngFor="let p of plans" [value]="p">{{ p | titlecase }}</option>
            </select>
          </div>
        </div>
        <div class="grid grid-cols-2 gap-4">
          <div>
            <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Contact Email</label>
            <input type="email" [(ngModel)]="form.contactEmail" class="w-full px-3 py-2 rounded-lg border border-gray-300 dark:border-slate-600 bg-white dark:bg-slate-700 text-gray-900 dark:text-gray-100 text-sm outline-none" />
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Billing Email</label>
            <input type="email" [(ngModel)]="form.billingEmail" class="w-full px-3 py-2 rounded-lg border border-gray-300 dark:border-slate-600 bg-white dark:bg-slate-700 text-gray-900 dark:text-gray-100 text-sm outline-none" />
          </div>
        </div>
        <div class="grid grid-cols-2 gap-4">
          <div>
            <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Max Users</label>
            <input type="number" [(ngModel)]="form.maxUsers" class="w-full px-3 py-2 rounded-lg border border-gray-300 dark:border-slate-600 bg-white dark:bg-slate-700 text-gray-900 dark:text-gray-100 text-sm outline-none" />
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Max Properties</label>
            <input type="number" [(ngModel)]="form.maxProperties" class="w-full px-3 py-2 rounded-lg border border-gray-300 dark:border-slate-600 bg-white dark:bg-slate-700 text-gray-900 dark:text-gray-100 text-sm outline-none" />
          </div>
        </div>
        <div class="flex items-center gap-2">
          <input type="checkbox" [(ngModel)]="form.isActive" id="isActive" class="rounded border-gray-300 dark:border-slate-600" />
          <label for="isActive" class="text-sm text-gray-700 dark:text-gray-300">Active</label>
        </div>
      </div>
      <div class="flex justify-end gap-3 mt-6">
        <button (click)="showForm = false" class="px-4 py-2 rounded-lg border border-gray-300 dark:border-slate-600 text-sm text-gray-700 dark:text-gray-300">Cancel</button>
        <button (click)="save()" [disabled]="saving" class="px-6 py-2 rounded-lg text-white text-sm font-medium" [style.background-color]="themeService.accent" [class.opacity-50]="saving">
          {{ saving ? 'Saving...' : (editing ? 'Update' : 'Create') }}
        </button>
      </div>
    </div>
  </div>
</div>
