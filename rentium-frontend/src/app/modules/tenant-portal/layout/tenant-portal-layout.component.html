<div class="portal-shell">
  <!-- Sidebar overlay (mobile) -->
  <div class="sidebar-overlay" [class.active]="sidebarOpen" (click)="sidebarOpen = false"></div>

  <!-- Sidebar -->
  <aside class="portal-sidebar" [class.open]="sidebarOpen">
    <div class="sidebar-brand">
      <div class="brand-icon">🏠</div>
      <span class="brand-name">Rentium</span>
      <span class="brand-tag">Tenant Portal</span>
    </div>

    <nav class="sidebar-nav">
      <a
        *ngFor="let item of navItems"
        [routerLink]="item.route"
        routerLinkActive="active"
        class="nav-item"
        (click)="sidebarOpen = false"
      >
        <span class="nav-icon">{{ item.icon }}</span>
        <span>{{ item.label }}</span>
      </a>
    </nav>

    <div class="sidebar-footer">
      <div class="user-info" *ngIf="profile">
        <div class="user-avatar">{{ profile.name[0] | uppercase }}</div>
        <div class="user-details">
          <div class="user-name">{{ profile.name }}</div>
          <div class="user-email">{{ profile.email }}</div>
        </div>
      </div>
      <button class="logout-btn" (click)="logout()">
        <span>↩</span> Logout
      </button>
    </div>
  </aside>

  <!-- Main content -->
  <div class="portal-main">
    <!-- Top bar -->
    <header class="portal-topbar">
      <button class="hamburger" (click)="toggleSidebar()">☰</button>
      <div class="topbar-title">Tenant Portal</div>
      <div class="topbar-user" *ngIf="profile">
        <div class="user-chip">{{ profile.name[0] | uppercase }}</div>
        <span class="user-chip-name">{{ profile.name }}</span>
      </div>
    </header>

    <!-- Page content -->
    <main class="portal-content">
      <router-outlet></router-outlet>
    </main>
  </div>
</div>
