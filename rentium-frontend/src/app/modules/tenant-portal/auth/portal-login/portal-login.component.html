<div class="auth-page">
  <div class="auth-card">
    <div class="auth-brand">
      <div class="brand-icon">🏠</div>
      <div class="brand-text">
        <h1>Rentium</h1>
        <p>Tenant Portal</p>
      </div>
    </div>

    <!-- Checking existing session -->
    <ng-container *ngIf="checkingSession">
      <div class="session-check">
        <span class="spinner"></span>
        <p>Checking session…</p>
      </div>
    </ng-container>

    <ng-container *ngIf="!checkingSession">
      <h2 class="auth-title">Sign in to your account</h2>
      <p class="auth-subtitle">Enter the email your property manager registered for you</p>

      <div class="error-alert" *ngIf="error">{{ error }}</div>

      <form [formGroup]="form" (ngSubmit)="submit()">
      <div class="form-group">
        <label>Email address</label>
        <input
          type="email"
          formControlName="email"
          placeholder="you@example.com"
          autocomplete="email"
        />
        <div class="field-error" *ngIf="form.get('email')?.touched && form.get('email')?.invalid">
          Please enter a valid email address
        </div>
      </div>

      <div class="form-group">
        <label>Password</label>
        <div class="input-wrapper">
          <input
            [type]="showPassword ? 'text' : 'password'"
            formControlName="password"
            placeholder="Enter your password"
            autocomplete="current-password"
          />
          <button type="button" class="toggle-pw" (click)="showPassword = !showPassword">
            {{ showPassword ? '🙈' : '👁️' }}
          </button>
        </div>
      </div>

      <button type="submit" class="btn-primary" [disabled]="loading || form.invalid">
        <span *ngIf="!loading">Sign In</span>
        <span *ngIf="loading" class="spinner"></span>
      </button>
    </form>

    <p class="auth-help">
      First time here? Check your email for a setup link from your property manager.
    </p>
    </ng-container>
  </div>
</div>
