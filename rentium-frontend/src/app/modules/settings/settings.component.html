<div>
  <h1 class="text-2xl font-bold text-gray-800 dark:text-gray-100 mb-6">Settings</h1>

  <div class="space-y-6 max-w-2xl">
    <!-- Profile -->
    <div class="bg-white dark:bg-slate-800 rounded-xl border border-gray-200 dark:border-slate-700 p-6">
      <h2 class="text-lg font-semibold text-gray-800 dark:text-gray-100 mb-4">Profile</h2>
      <div *ngIf="user" class="flex items-center gap-4">
        <div class="w-16 h-16 rounded-full flex items-center justify-center text-white text-xl font-bold" [style.background-color]="themeService.accent">{{ user.name?.charAt(0) || '?' }}</div>
        <div>
          <div class="text-lg font-medium text-gray-800 dark:text-gray-100">{{ user.name }}</div>
          <div class="text-sm text-gray-500 dark:text-gray-400">{{ user.email }}</div>
          <span class="px-2 py-1 rounded-full text-xs font-medium mt-1 inline-block" [ngClass]="{'bg-red-100 text-red-700 dark:bg-red-900/30 dark:text-red-400': user.role === 'super_admin', 'bg-purple-100 text-purple-700 dark:bg-purple-900/30 dark:text-purple-400': user.role === 'admin', 'bg-blue-100 text-blue-700 dark:bg-blue-900/30 dark:text-blue-400': user.role === 'manager', 'bg-green-100 text-green-700 dark:bg-green-900/30 dark:text-green-400': user.role === 'agent'}">{{ user.role }}</span>
        </div>
      </div>
    </div>

    <!-- Appearance -->
    <div class="bg-white dark:bg-slate-800 rounded-xl border border-gray-200 dark:border-slate-700 p-6">
      <h2 class="text-lg font-semibold text-gray-800 dark:text-gray-100 mb-4">Appearance</h2>

      <!-- Dark Mode -->
      <div class="flex items-center justify-between mb-6">
        <div>
          <div class="text-sm font-medium text-gray-800 dark:text-gray-100">Dark Mode</div>
          <div class="text-xs text-gray-500 dark:text-gray-400">Switch between light and dark theme</div>
        </div>
        <button (click)="toggleDarkMode()" class="w-12 h-6 rounded-full relative transition-colors" [class.bg-green-500]="themeService.isDark" [class.bg-gray-300]="!themeService.isDark">
          <div class="w-5 h-5 rounded-full bg-white absolute top-0.5 transition-transform" [class.translate-x-6]="themeService.isDark" [class.translate-x-0.5]="!themeService.isDark"></div>
        </button>
      </div>

      <!-- Accent Color -->
      <div>
        <div class="text-sm font-medium text-gray-800 dark:text-gray-100 mb-2">Accent Color</div>
        <div class="text-xs text-gray-500 dark:text-gray-400 mb-3">Choose your preferred accent color</div>
        <div class="flex flex-wrap gap-2">
          <button *ngFor="let color of presetColors" (click)="setAccentColor(color)" class="w-8 h-8 rounded-full border-2 transition-transform hover:scale-110" [style.background-color]="color" [class.border-gray-800]="themeService.accent === color" [class.border-transparent]="themeService.accent !== color" [class.dark:border-white]="themeService.accent === color">
            <i *ngIf="themeService.accent === color" class="fas fa-check text-white text-xs"></i>
          </button>
        </div>
      </div>
    </div>
  </div>
</div>
